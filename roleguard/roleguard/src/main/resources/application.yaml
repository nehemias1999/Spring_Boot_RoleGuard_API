spring:
  application:
    name: roleguard

  datasource:
    url: jdbc:mysql://localhost:3306/roleguard_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  # Default is a dev-only key. Override with a strong secret in production via JWT_SECRET env var.
  secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1kb250LXVzZS1pbi1wcm9k}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

server:
  port: 8080

logging:
  level:
    com.nsalazar.roleguard: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
